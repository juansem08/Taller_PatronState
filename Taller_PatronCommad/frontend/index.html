<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Comando de Realidad</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #0a0a0f; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Mock icons since we can't easily import lucide-react in CDN without extra setup
        // We'll use SVG paths or simple text icons for simplicity in this single-file version
        const Icon = ({ name, color, size = 20 }) => {
            return <i data-lucide={name} style={{ color: color, width: size, height: size }}></i>;
        };

        const API_URL = 'http://localhost:8080/api/coherence';

        const phases = [
            { id: 'NewtonianState', label: 'Newtoniana', icon: 'activity', color: '#60a5fa', bg: 'rgba(96, 165, 250, 0.2)' },
            { id: 'AnomalousState', label: 'Anómala', icon: 'alert-triangle', color: '#f87171', bg: 'rgba(248, 113, 113, 0.2)' },
            { id: 'SpeculativeState', label: 'Especulativa', icon: 'cpu', color: '#22d3ee', bg: 'rgba(34, 211, 238, 0.2)' },
            { id: 'QuantumEntanglementState', label: 'Cuántica', icon: 'orbit', color: '#a78bfa', bg: 'rgba(167, 139, 250, 0.2)' }
        ];

        function App() {
            const [status, setStatus] = useState(null);
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);

            const fetchStatus = async (endpoint = '/status', method = 'GET') => {
                try {
                    const response = await fetch(`${API_URL}${endpoint}`, { method });
                    const data = await response.json();
                    setStatus(data);
                    addLog(`Fase: ${data.phase}. Valor: ${data.value.toFixed(2)}`);
                } catch (err) {
                    addLog(`Error de conexión: ${err.message}`);
                } finally {
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            useEffect(() => {
                fetchStatus();
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            const addLog = (msg) => {
                const time = new Date().toLocaleTimeString();
                setLogs(prev => [...prev, `${time} - ${msg}`].slice(-8));
            };

            const handleNextPhase = () => fetchStatus('/next', 'POST');
            const handleReset = () => fetchStatus('/reset', 'POST');

            const currentPhaseIndex = phases.findIndex(p => p.id === status?.phase);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <header className="mb-10 text-center">
                        <h1 className="text-4xl md:text-5xl font-black bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent uppercase tracking-tighter">
                            Centro de Comando
                        </h1>
                        <p className="text-slate-500 mt-2 tracking-widest uppercase text-xs font-semibold">Monitor de Coherencia Digital Twin</p>
                    </header>

                    <div className="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8">
                        
                        {/* Indicador de Fase */}
                        <div className="bg-[#111116] border border-slate-800 rounded-3xl p-6 shadow-2xl">
                            <h2 className="text-xl font-bold mb-8 text-slate-300 flex items-center gap-2">
                                <i data-lucide="layers" className="text-blue-400"></i>
                                Indicador de Fase
                            </h2>
                            <div className="space-y-6 relative ml-4 border-l-2 border-slate-800 pl-8">
                                {phases.map((phase, idx) => {
                                    const isActive = idx === currentPhaseIndex;
                                    const isPast = idx < currentPhaseIndex;
                                    
                                    return (
                                        <div key={phase.id} className="relative group">
                                            <div className={`absolute -left-[41px] top-1/2 -translate-y-1/2 flex items-center justify-center w-5 h-5 rounded-full border-2 ${
                                                isActive ? `bg-blue-500 border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.5)] animate-pulse` :
                                                isPast ? 'bg-slate-700 border-slate-600' : 'bg-[#0a0a0f] border-slate-800'
                                            }`}></div>
                                            
                                            <div className={`p-5 rounded-2xl border transition-all duration-500 ${
                                                isActive ? `border-blue-500/50 bg-[#151520] translate-x-2` : 'border-slate-800 bg-[#0c0c12]'
                                            }`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`p-3 rounded-xl ${isActive ? 'bg-blue-500/20 text-blue-400' : 'bg-slate-800/50 text-slate-600'}`}>
                                                        <i data-lucide={phase.icon} className="w-5 h-5"></i>
                                                    </div>
                                                    <div>
                                                        <div className={`font-black text-lg ${isActive ? 'text-white' : 'text-slate-600'}`}>
                                                            {phase.label.toUpperCase()}
                                                        </div>
                                                        <div className="text-xs text-slate-500 font-medium">Fase {idx + 1} del Ciclo</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Telemetría y Controles */}
                        <div className="space-y-8">
                            <div className="bg-[#111116] border border-slate-800 rounded-3xl p-6 shadow-2xl">
                                <h2 className="text-xl font-bold mb-6 text-slate-300">Telemetría en Vivo</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="bg-[#0a0a0f] p-5 rounded-2xl border border-slate-800/50 group hover:border-slate-700 transition-colors">
                                        <div className="text-xs text-slate-500 mb-2 uppercase font-bold tracking-wider">Lectura Bruta</div>
                                        <div className="text-3xl font-black text-slate-300 tabular-nums">
                                            {status?.rawReading.toFixed(2) || '0.00'}
                                        </div>
                                    </div>
                                    <div className="bg-[#0a0a0f] p-5 rounded-2xl border border-slate-800/50 group hover:border-slate-700 transition-colors">
                                        <div className="text-xs text-slate-500 mb-2 uppercase font-bold tracking-wider">Valor Procesado</div>
                                        <div className={`text-3xl font-black tabular-nums ${currentPhaseIndex >= 0 ? 'text-blue-400' : 'text-white'}`}>
                                            {status?.value.toFixed(2) || '0.00'}
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-8 flex flex-col sm:flex-row gap-4">
                                    <button 
                                        onClick={handleNextPhase} 
                                        className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-6 rounded-2xl transition-all shadow-lg shadow-blue-900/20 active:scale-95 uppercase text-sm tracking-widest"
                                    >
                                        Avanzar Fase
                                    </button>
                                    <button 
                                        onClick={handleReset} 
                                        className="px-8 py-4 bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold rounded-2xl transition-all border border-slate-700 active:scale-95 uppercase text-xs tracking-widest"
                                    >
                                        Reiniciar
                                    </button>
                                </div>
                            </div>

                            <div className="bg-[#111116] border border-slate-800 rounded-3xl p-6 shadow-2xl">
                                <h2 className="text-xs font-black mb-4 text-slate-500 uppercase tracking-widest flex items-center gap-2">
                                    <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                    Eventos del Sistema
                                </h2>
                                <div className="bg-[#050508] border border-slate-800/50 rounded-2xl p-5 h-56 overflow-y-auto font-mono text-sm space-y-3 custom-scrollbar">
                                    {logs.map((log, i) => (
                                        <div key={i} className="flex gap-3">
                                            <span className="text-slate-600 shrink-0">[{i}]</span>
                                            <span className={log.includes('Error') ? 'text-red-400' : 'text-cyan-400'}>
                                                {log}
                                            </span>
                                        </div>
                                    ))}
                                    {logs.length === 0 && <div className="text-slate-700 italic">Esperando telemetría...</div>}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
